<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXEN Orders</title>

<style>
body{
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

form{
  background:#111;
  padding:30px;
  border-radius:20px;
  width:300px;
}

input,select,textarea{
  width:100%;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:#c7a56a;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

#done{
  display:none;
  color:lime;
  margin-top:10px;
}
</style>
</head>

<body>

<form name="order" method="POST" data-netlify="true" id="form">

<input type="hidden" name="form-name" value="order">

<input type="hidden" name="products" id="products">
<input type="hidden" name="total" id="total">

<h3>Order AXEN</h3>

<input type="text" name="name" placeholder="الاسم" required>
<input type="tel" name="phone" placeholder="رقم الموبايل" required>
<input type="text" name="address" placeholder="العنوان" required>

<select name="city">
<option>القاهرة</option>
<option>الجيزة</option>
<option>الفيوم</option>
</select>

<select name="payment">
<option>الدفع عند الاستلام</option>
<option>فودافون كاش</option>
</select>

<textarea name="notes" placeholder="ملاحظات"></textarea>

<button type="submit">تأكيد الطلب</button>

<div id="done">تم إرسال الطلب ✔️</div>

</form>

<script>
const form = document.getElementById("form");

form.addEventListener("submit", function(e){
  e.preventDefault();

  document.getElementById("products").value = "Test Product x1";
  document.getElementById("total").value = "500 EGP";

  const data = new FormData(form);

  fetch("/", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams(data).toString()
  })
  .then(() => {
    document.getElementById("done").style.display = "block";
    form.reset();
  })
});
</script>

</body>
</html>
